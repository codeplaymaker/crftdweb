<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRFTD Web — Ad 7: Gather Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#111;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            overflow:auto;
        }

        .frame-wrapper {
            transform:scale(0.45);
            transform-origin:top center;
            margin:20px auto;
        }

        .frame {
            width:1080px;
            height:1920px;
            background:#0a0a0a;
            position:relative;
            overflow:hidden;
            font-family:'Inter',sans-serif;
        }

        /* Subtle pixel grid bg */
        .frame::before {
            content:'';
            position:absolute;
            inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
            background-size:24px 24px;
            pointer-events:none;
        }

        .safe-overlay {
            display:none;
            position:absolute;
            inset:0;
            z-index:100;
            pointer-events:none;
        }
        #showSafe:checked ~ .frame-wrapper .safe-overlay { display:block; }
        .safe-overlay .safe-top    { position:absolute; top:0; left:0; right:0; height:150px; background:rgba(255,0,0,.12); border-bottom:2px dashed rgba(255,0,0,.4); }
        .safe-overlay .safe-bottom { position:absolute; bottom:0; left:0; right:0; height:480px; background:rgba(255,0,0,.12); border-top:2px dashed rgba(255,0,0,.4); }
        .safe-overlay .safe-right  { position:absolute; top:150px; right:0; width:150px; bottom:480px; background:rgba(255,0,0,.08); border-left:2px dashed rgba(255,0,0,.3); }
        .safe-overlay .safe-left   { position:absolute; top:150px; left:0; width:60px; bottom:480px; background:rgba(255,0,0,.05); border-right:1px dashed rgba(255,0,0,.2); }

        .content {
            position:absolute;
            top:150px;
            left:0;
            right:0;
            bottom:480px;
            display:flex;
            flex-direction:column;
            align-items:center;
            z-index:10;
        }

        .logo-top {
            height:36px;
            opacity:.4;
            margin-top:20px;
            margin-bottom:32px;
        }

        .tag {
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:10px 24px;
            border-radius:100px;
            background:rgba(139,92,246,.08);
            border:1px solid rgba(139,92,246,.18);
            color:#a78bfa;
            font-size:14px;
            font-weight:700;
            letter-spacing:0.08em;
            text-transform:uppercase;
            margin-bottom:28px;
        }

        .headline {
            font-size:74px;
            font-weight:900;
            line-height:.90;
            letter-spacing:-0.04em;
            color:white;
            text-align:center;
            margin-bottom:0;
        }

        .headline-accent {
            font-size:74px;
            font-weight:300;
            font-style:italic;
            color:rgba(139,92,246,.22);
            text-align:center;
            line-height:.95;
            margin-bottom:40px;
        }

        /* ========== PIXEL MAP ========== */
        .pixel-map {
            width:900px;
            height:580px;
            background:#12121a;
            border-radius:20px;
            border:2px solid rgba(139,92,246,.12);
            position:relative;
            overflow:hidden;
            box-shadow:0 30px 70px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
        }

        /* Floor grid inside */
        .pixel-map::before {
            content:'';
            position:absolute;
            inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size:24px 24px;
            pointer-events:none;
        }

        /* Rooms */
        .room {
            position:absolute;
            border-radius:4px;
            border:2px solid;
        }

        .room-strategy {
            top:24px; left:24px;
            width:252px; height:240px;
            background:rgba(59,130,246,.06);
            border-color:rgba(59,130,246,.2);
        }
        .room-design {
            top:24px; left:300px;
            width:276px; height:240px;
            background:rgba(236,72,153,.06);
            border-color:rgba(236,72,153,.2);
        }
        .room-dev {
            top:24px; right:24px;
            width:276px; height:240px;
            background:rgba(16,185,129,.06);
            border-color:rgba(16,185,129,.2);
        }
        .room-launch {
            bottom:24px; left:50%;
            transform:translateX(-50%);
            width:400px; height:220px;
            background:rgba(245,158,11,.06);
            border-color:rgba(245,158,11,.2);
        }
        /* Hallway connectors */
        .hallway-h {
            position:absolute;
            top:288px; left:24px; right:24px;
            height:48px;
            background:rgba(255,255,255,.015);
            border-radius:4px;
        }
        .hallway-v {
            position:absolute;
            top:288px; left:50%;
            transform:translateX(-50%);
            width:48px; height:100px;
            background:rgba(255,255,255,.015);
            border-radius:4px;
        }

        /* Room labels */
        .room-label {
            font-family:'Press Start 2P',monospace;
            font-size:10px;
            letter-spacing:0.04em;
            position:absolute;
            top:12px;
            left:14px;
            opacity:.7;
        }
        .room-strategy .room-label { color:#3b82f6; }
        .room-design .room-label   { color:#ec4899; }
        .room-dev .room-label      { color:#10b981; }
        .room-launch .room-label   { color:#f59e0b; }

        /* Pixel furniture / objects */
        .obj {
            position:absolute;
            border-radius:3px;
            image-rendering:pixelated;
        }

        /* Strategy room objects */
        .whiteboard {
            width:72px; height:48px;
            background:rgba(255,255,255,.08);
            border:2px solid rgba(255,255,255,.12);
            top:50px; left:90px;
        }
        .wb-line { position:absolute; height:2px; background:rgba(59,130,246,.4); border-radius:1px; }
        .wb-l1 { top:10px; left:8px; width:36px; }
        .wb-l2 { top:18px; left:8px; width:50px; }
        .wb-l3 { top:26px; left:8px; width:28px; }

        .table-s {
            width:120px; height:60px;
            background:rgba(59,130,246,.08);
            border:2px solid rgba(59,130,246,.12);
            border-radius:6px;
            top:120px; left:66px;
        }

        /* Design room objects */
        .screen-d {
            width:48px; height:36px;
            background:rgba(236,72,153,.1);
            border:2px solid rgba(236,72,153,.18);
            border-radius:3px;
        }
        .screen-d1 { top:56px; left:30px; }
        .screen-d2 { top:56px; left:100px; }
        .screen-d3 { top:56px; left:170px; }

        .desk-d {
            width:220px; height:10px;
            background:rgba(236,72,153,.08);
            border-radius:2px;
            top:100px; left:28px;
        }

        .palette {
            width:60px; height:60px;
            background:rgba(236,72,153,.06);
            border:2px solid rgba(236,72,153,.12);
            border-radius:8px;
            top:140px; left:100px;
        }
        .color-dot { position:absolute; width:12px; height:12px; border-radius:50%; }
        .cd1 { top:10px; left:10px; background:#ec4899; }
        .cd2 { top:10px; left:28px; background:#8b5cf6; }
        .cd3 { top:28px; left:10px; background:#3b82f6; }
        .cd4 { top:28px; left:28px; background:#10b981; }

        /* Dev room objects */
        .terminal {
            width:84px; height:48px;
            background:#0d1117;
            border:2px solid rgba(16,185,129,.2);
            border-radius:4px;
        }
        .terminal1 { top:56px; left:24px; }
        .terminal2 { top:56px; left:132px; }

        .t-line { position:absolute; height:2px; border-radius:1px; }
        .tl1 { top:10px; left:8px; width:28px; background:rgba(16,185,129,.5); }
        .tl2 { top:18px; left:8px; width:44px; background:rgba(139,92,246,.4); }
        .tl3 { top:26px; left:8px; width:18px; background:rgba(245,158,11,.4); }
        .tl4 { top:34px; left:8px; width:36px; background:rgba(16,185,129,.3); }

        .server-rack {
            width:36px; height:72px;
            background:rgba(16,185,129,.06);
            border:2px solid rgba(16,185,129,.15);
            border-radius:4px;
            top:120px; left:228px;
        }
        .sr-light { position:absolute; width:8px; height:8px; border-radius:50%; left:12px; }
        .srl1 { top:10px; background:#10b981; box-shadow:0 0 6px rgba(16,185,129,.6); }
        .srl2 { top:26px; background:#10b981; box-shadow:0 0 6px rgba(16,185,129,.6); }
        .srl3 { top:42px; background:#f59e0b; box-shadow:0 0 6px rgba(245,158,11,.4); }

        /* Launch room objects */
        .rocket {
            font-size:42px;
            position:absolute;
            top:60px; left:50%;
            transform:translateX(-50%);
        }

        .progress-track {
            position:absolute;
            bottom:40px; left:40px; right:40px;
            height:18px;
            background:rgba(255,255,255,.04);
            border-radius:10px;
            overflow:hidden;
        }
        .progress-fill {
            height:100%;
            width:80%;
            border-radius:10px;
            background:linear-gradient(90deg, #f59e0b, #10b981);
        }
        .progress-text {
            position:absolute;
            bottom:64px; right:40px;
            font-family:'Press Start 2P',monospace;
            font-size:10px;
            color:#f59e0b;
            opacity:.8;
        }

        /* ========== PIXEL AVATARS ========== */
        .avatar {
            position:absolute;
            z-index:5;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:6px;
        }

        .avatar-body {
            width:28px;
            height:28px;
            border-radius:6px;
            image-rendering:pixelated;
            box-shadow:0 0 0 2px rgba(0,0,0,.3);
        }

        .avatar-name {
            font-family:'Press Start 2P',monospace;
            font-size:7px;
            padding:3px 8px;
            border-radius:4px;
            white-space:nowrap;
        }

        /* Proximity radius circles */
        .avatar::before {
            content:'';
            position:absolute;
            width:80px; height:80px;
            border-radius:50%;
            border:1.5px dashed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            opacity:.25;
        }

        .av-you        { top:160px; left:110px; }
        .av-you .avatar-body { background:#8b5cf6; }
        .av-you .avatar-name { background:rgba(139,92,246,.2); color:#a78bfa; }
        .av-you::before { border-color:#8b5cf6; }

        .av-designer   { top:140px; left:420px; }
        .av-designer .avatar-body { background:#ec4899; }
        .av-designer .avatar-name { background:rgba(236,72,153,.2); color:#f472b6; }
        .av-designer::before { border-color:#ec4899; }

        .av-dev        { top:130px; left:700px; }
        .av-dev .avatar-body { background:#10b981; }
        .av-dev .avatar-name { background:rgba(16,185,129,.2); color:#34d399; }
        .av-dev::before { border-color:#10b981; }

        .av-pm         { top:310px; left:440px; }
        .av-pm .avatar-body { background:#3b82f6; }
        .av-pm .avatar-name { background:rgba(59,130,246,.2); color:#60a5fa; }
        .av-pm::before { border-color:#3b82f6; }

        /* Connection lines between avatars */
        .connection {
            position:absolute;
            z-index:3;
            pointer-events:none;
        }

        .conn-line {
            stroke-dasharray:6 4;
            stroke-width:1.5;
            opacity:.3;
        }

        /* ========== BOTTOM SECTION ========== */
        .stats-row {
            display:flex;
            gap:16px;
            margin-top:36px;
            margin-bottom:auto;
        }

        .stat-pill {
            padding:14px 26px;
            border-radius:100px;
            background:rgba(255,255,255,.04);
            border:1px solid rgba(255,255,255,.06);
            color:rgba(255,255,255,.55);
            font-size:17px;
            font-weight:600;
            display:flex;
            align-items:center;
            gap:8px;
        }

        .stat-pill .sp-icon { font-size:18px; }

        .cta-area {
            display:flex;
            flex-direction:column;
            align-items:center;
            margin-top:36px;
            z-index:15;
        }

        .cta-btn {
            background:white;
            color:#0a0a0a;
            font-size:24px;
            font-weight:800;
            padding:22px 60px;
            border-radius:100px;
            border:none;
            cursor:pointer;
            margin-bottom:14px;
            box-shadow:0 4px 28px rgba(255,255,255,.1);
            font-family:'Inter',sans-serif;
        }

        .cta-sub {
            font-size:15px;
            color:rgba(255,255,255,.22);
        }

        .controls {
            position:fixed;
            top:0; left:0; right:0;
            z-index:9999;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(10px);
            padding:12px 24px;
            display:flex;
            align-items:center;
            gap:20px;
            font-size:13px;
            color:white;
        }
        .controls label { display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:500; }
        .controls button {
            background:white; color:#0a0a0a; border:none; padding:8px 24px;
            border-radius:100px; font-family:'Inter',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
        }
    </style>
</head>
<body>

<div class="controls">
    <label><input type="checkbox" id="showSafe"> Show TikTok Safe Zones</label>
    <button id="dl">⬇ Download PNG (1080×1920)</button>
</div>

<input type="checkbox" id="showSafe" style="display:none;">

<div class="frame-wrapper">
    <div class="frame" id="frame">

        <div class="safe-overlay">
            <div class="safe-top"></div>
            <div class="safe-bottom"></div>
            <div class="safe-right"></div>
            <div class="safe-left"></div>
        </div>

        <div class="content">
            <img src="../CW-logo-white.png" alt="CRFTD Web" class="logo-top">
            <div class="tag">✦ How We Work</div>
            <div class="headline">We don't just</div>
            <div class="headline">build sites.</div>
            <div class="headline-accent">We build the system.</div>

            <!-- Pixel Office Map -->
            <div class="pixel-map">

                <!-- Hallways -->
                <div class="hallway-h"></div>
                <div class="hallway-v"></div>

                <!-- Strategy Room -->
                <div class="room room-strategy">
                    <div class="room-label">STRATEGY</div>
                    <div class="obj whiteboard">
                        <div class="wb-line wb-l1"></div>
                        <div class="wb-line wb-l2"></div>
                        <div class="wb-line wb-l3"></div>
                    </div>
                    <div class="obj table-s"></div>
                </div>

                <!-- Design Room -->
                <div class="room room-design">
                    <div class="room-label">DESIGN</div>
                    <div class="obj screen-d screen-d1"></div>
                    <div class="obj screen-d screen-d2"></div>
                    <div class="obj screen-d screen-d3"></div>
                    <div class="obj desk-d"></div>
                    <div class="obj palette">
                        <div class="color-dot cd1"></div>
                        <div class="color-dot cd2"></div>
                        <div class="color-dot cd3"></div>
                        <div class="color-dot cd4"></div>
                    </div>
                </div>

                <!-- Dev Room -->
                <div class="room room-dev">
                    <div class="room-label">DEVELOPMENT</div>
                    <div class="obj terminal terminal1">
                        <div class="t-line tl1"></div>
                        <div class="t-line tl2"></div>
                        <div class="t-line tl3"></div>
                        <div class="t-line tl4"></div>
                    </div>
                    <div class="obj terminal terminal2">
                        <div class="t-line tl1"></div>
                        <div class="t-line tl2"></div>
                        <div class="t-line tl3"></div>
                        <div class="t-line tl4"></div>
                    </div>
                    <div class="obj server-rack">
                        <div class="sr-light srl1"></div>
                        <div class="sr-light srl2"></div>
                        <div class="sr-light srl3"></div>
                    </div>
                </div>

                <!-- Launch Room -->
                <div class="room room-launch">
                    <div class="room-label">LAUNCH PAD</div>
                    <div class="rocket">🚀</div>
                    <div class="progress-text">80% — ON TRACK</div>
                    <div class="progress-track">
                        <div class="progress-fill"></div>
                    </div>
                </div>

                <!-- Connection lines SVG -->
                <svg class="connection" width="900" height="580" style="position:absolute;top:0;left:0;">
                    <!-- You → Designer -->
                    <line class="conn-line" x1="124" y1="174" x2="434" y2="154" stroke="#a78bfa"/>
                    <!-- Designer → Dev -->
                    <line class="conn-line" x1="434" y1="154" x2="714" y2="144" stroke="#f472b6"/>
                    <!-- PM → Designer -->
                    <line class="conn-line" x1="454" y1="324" x2="434" y2="154" stroke="#60a5fa"/>
                </svg>

                <!-- Avatars -->
                <div class="avatar av-you">
                    <div class="avatar-body"></div>
                    <div class="avatar-name">You</div>
                </div>
                <div class="avatar av-designer">
                    <div class="avatar-body"></div>
                    <div class="avatar-name">Designer</div>
                </div>
                <div class="avatar av-dev">
                    <div class="avatar-body"></div>
                    <div class="avatar-name">Developer</div>
                </div>
                <div class="avatar av-pm">
                    <div class="avatar-body"></div>
                    <div class="avatar-name">Project Lead</div>
                </div>

            </div>

            <div class="stats-row">
                <div class="stat-pill"><span class="sp-icon">⚡</span> 14-Day Sprints</div>
                <div class="stat-pill"><span class="sp-icon">👥</span> Live Collaboration</div>
                <div class="stat-pill"><span class="sp-icon">🔍</span> Full Transparency</div>
            </div>

            <div class="cta-area">
                <button class="cta-btn">See How We Build ›</button>
                <div class="cta-sub">Book a walkthrough</div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
document.querySelector('.controls label input').addEventListener('change', function() {
    document.getElementById('showSafe').checked = this.checked;
});
document.getElementById('dl').addEventListener('click', async () => {
    const btn = document.getElementById('dl');
    btn.textContent = 'Generating...';
    const frame = document.getElementById('frame');
    const wrapper = frame.parentElement;
    const origTransform = wrapper.style.transform;
    wrapper.style.transform = 'none';
    const safeOverlay = frame.querySelector('.safe-overlay');
    safeOverlay.style.display = 'none';
    try {
        const canvas = await html2canvas(frame, {
            width:1080, height:1920, scale:1, useCORS:true,
            backgroundColor:'#0a0a0a', scrollX:0, scrollY:-window.scrollY,
            windowWidth:1080, windowHeight:1920,
        });
        const link = document.createElement('a');
        link.download = 'crftdweb-ad-7-1080x1920.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    } finally {
        wrapper.style.transform = origTransform;
        safeOverlay.style.display = '';
        btn.textContent = '⬇ Download PNG (1080×1920)';
    }
});
</script>
</body>
</html>
