<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRFTD Web — Ad 13: Pain Only</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#111;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            overflow:auto;
        }

        .frame-wrapper {
            transform:scale(0.45);
            transform-origin:top center;
            margin:20px auto;
        }

        .frame {
            width:1080px;
            height:1920px;
            background:#0a0a0a;
            position:relative;
            overflow:hidden;
        }

        /* Safe zones */
        .safe-overlay {
            display:none;
            position:absolute;
            inset:0;
            z-index:100;
            pointer-events:none;
        }
        #showSafe:checked ~ .frame-wrapper .safe-overlay { display:block; }
        .safe-overlay .safe-top    { position:absolute; top:0; left:0; right:0; height:150px; background:rgba(255,0,0,.12); border-bottom:2px dashed rgba(255,0,0,.4); }
        .safe-overlay .safe-bottom { position:absolute; bottom:0; left:0; right:0; height:480px; background:rgba(255,0,0,.12); border-top:2px dashed rgba(255,0,0,.4); }
        .safe-overlay .safe-right  { position:absolute; top:150px; right:0; width:150px; bottom:480px; background:rgba(255,0,0,.08); border-left:2px dashed rgba(255,0,0,.3); }
        .safe-overlay .safe-left   { position:absolute; top:150px; left:0; width:60px; bottom:480px; background:rgba(255,0,0,.05); border-right:1px dashed rgba(255,0,0,.2); }

        .content {
            position:absolute;
            top:150px;
            left:0;
            right:0;
            bottom:480px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:0 100px;
        }

        /* The single devastating line */
        .pain-text {
            font-size:64px;
            font-weight:800;
            color:white;
            line-height:1.15;
            text-align:left;
            letter-spacing:-0.03em;
            max-width:880px;
        }

        .pain-text .dim {
            color:rgba(255,255,255,.18);
        }

        .pain-text .highlight {
            color:white;
            position:relative;
        }

        .pain-text .highlight::after {
            content:'';
            position:absolute;
            left:0;
            right:0;
            bottom:2px;
            height:3px;
            background:rgba(239,68,68,.4);
            border-radius:2px;
        }

        .pain-text .red {
            color:rgba(239,68,68,.7);
        }

        /* Separator */
        .sep {
            width:60px;
            height:2px;
            background:rgba(255,255,255,.06);
            margin:56px 0;
            align-self:flex-start;
        }

        /* Second pain line */
        .pain-sub {
            font-size:28px;
            font-weight:400;
            color:rgba(255,255,255,.22);
            line-height:1.5;
            text-align:left;
            align-self:flex-start;
            max-width:780px;
        }

        .pain-sub strong {
            color:rgba(255,255,255,.4);
            font-weight:600;
        }

        /* Tiny stat — just one, devastating */
        .single-stat {
            align-self:flex-start;
            margin-top:56px;
            padding:20px 32px;
            border-left:3px solid rgba(239,68,68,.3);
            background:rgba(239,68,68,.03);
        }

        .ss-number {
            font-size:52px;
            font-weight:900;
            color:rgba(239,68,68,.6);
            letter-spacing:-0.04em;
            line-height:1;
        }

        .ss-label {
            font-size:16px;
            font-weight:500;
            color:rgba(255,255,255,.15);
            margin-top:6px;
        }

        /* Logo at bottom — understated */
        .logo-bottom {
            position:absolute;
            bottom:510px;
            left:0;
            right:0;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:12px;
        }

        .logo-bottom img {
            height:28px;
            opacity:.15;
        }

        .logo-bottom span {
            font-size:13px;
            font-weight:500;
            color:rgba(255,255,255,.1);
            letter-spacing:.1em;
        }

        /* Controls */
        .controls {
            position:fixed;
            top:0; left:0; right:0;
            z-index:9999;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(10px);
            padding:12px 24px;
            display:flex;
            align-items:center;
            gap:20px;
            font-size:13px;
            color:white;
        }
        .controls label { display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:500; }
        .controls button {
            background:white; color:#0a0a0a; border:none; padding:8px 24px;
            border-radius:100px; font-family:'Inter',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
        }
    </style>
</head>
<body>

<div class="controls">
    <label><input type="checkbox" id="showSafe"> Show TikTok Safe Zones</label>
    <button id="dl">⬇ Download PNG (1080×1920)</button>
</div>

<input type="checkbox" id="showSafe" style="display:none;">

<div class="frame-wrapper">
    <div class="frame" id="frame">

        <div class="safe-overlay">
            <div class="safe-top"></div>
            <div class="safe-bottom"></div>
            <div class="safe-right"></div>
            <div class="safe-left"></div>
        </div>

        <div class="content">

            <div class="pain-text">
                <span class="dim">Your competitors</span> redesigned <span class="red">6 months ago.</span>
            </div>

            <div class="sep"></div>

            <div class="pain-sub">
                Every day your site stays the same, you're sending customers to someone who <strong>actually invested in theirs</strong>.
            </div>

            <div class="single-stat">
                <div class="ss-number">£347</div>
                <div class="ss-label">Average daily revenue lost to a slow website — UK businesses</div>
            </div>

        </div>

        <div class="logo-bottom">
            <img src="../CW-logo-white.png" alt="CRFTD Web">
            <span>crftdweb.com</span>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
document.querySelector('.controls label input').addEventListener('change', function() {
    document.getElementById('showSafe').checked = this.checked;
});
document.getElementById('dl').addEventListener('click', async () => {
    const btn = document.getElementById('dl');
    btn.textContent = 'Generating...';
    const frame = document.getElementById('frame');
    const wrapper = frame.parentElement;
    const origTransform = wrapper.style.transform;
    wrapper.style.transform = 'none';
    const safeOverlay = frame.querySelector('.safe-overlay');
    safeOverlay.style.display = 'none';
    try {
        const canvas = await html2canvas(frame, {
            width:1080, height:1920, scale:1, useCORS:true,
            backgroundColor:'#0a0a0a', scrollX:0, scrollY:-window.scrollY,
            windowWidth:1080, windowHeight:1920,
        });
        const link = document.createElement('a');
        link.download = 'crftdweb-ad-13-1080x1920.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    } finally {
        wrapper.style.transform = origTransform;
        safeOverlay.style.display = '';
        btn.textContent = '⬇ Download PNG (1080×1920)';
    }
});
</script>
</body>
</html>
