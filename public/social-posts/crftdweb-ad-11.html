<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRFTD Web — Ad 11: Mario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#111;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            overflow:auto;
        }

        .frame-wrapper {
            transform:scale(0.45);
            transform-origin:top center;
            margin:20px auto;
        }

        .frame {
            width:1080px;
            height:1920px;
            background:#0a0a0a;
            position:relative;
            overflow:hidden;
            font-family:'Inter',sans-serif;
        }

        .safe-overlay {
            display:none;
            position:absolute;
            inset:0;
            z-index:100;
            pointer-events:none;
        }
        #showSafe:checked ~ .frame-wrapper .safe-overlay { display:block; }
        .safe-overlay .safe-top    { position:absolute; top:0; left:0; right:0; height:150px; background:rgba(255,0,0,.12); border-bottom:2px dashed rgba(255,0,0,.4); }
        .safe-overlay .safe-bottom { position:absolute; bottom:0; left:0; right:0; height:480px; background:rgba(255,0,0,.12); border-top:2px dashed rgba(255,0,0,.4); }
        .safe-overlay .safe-right  { position:absolute; top:150px; right:0; width:150px; bottom:480px; background:rgba(255,0,0,.08); border-left:2px dashed rgba(255,0,0,.3); }
        .safe-overlay .safe-left   { position:absolute; top:150px; left:0; width:60px; bottom:480px; background:rgba(255,0,0,.05); border-right:1px dashed rgba(255,0,0,.2); }

        .content {
            position:absolute;
            top:150px;
            left:0;
            right:0;
            bottom:480px;
            display:flex;
            flex-direction:column;
            align-items:center;
            z-index:10;
        }

        .logo-top {
            height:36px;
            opacity:.4;
            margin-top:16px;
            margin-bottom:20px;
        }

        /* HUD bar — lives, coins, world, time */
        .hud {
            width:860px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 0;
            margin-bottom:20px;
        }

        .hud-item {
            text-align:center;
        }

        .hud-label {
            font-family:'Press Start 2P',monospace;
            font-size:10px;
            color:rgba(255,255,255,.3);
            margin-bottom:6px;
        }

        .hud-value {
            font-family:'Press Start 2P',monospace;
            font-size:16px;
            color:white;
            text-shadow:2px 2px 0 rgba(0,0,0,.5);
        }

        .hud-value .coin { color:#fbbf24; }
        .hud-value .red { color:#ef4444; }

        .headline {
            font-size:80px;
            font-weight:900;
            line-height:.88;
            letter-spacing:-0.04em;
            color:white;
            text-align:center;
            margin-bottom:0;
            text-shadow:3px 3px 0 rgba(0,0,0,.3);
        }

        .headline-accent {
            font-size:80px;
            font-weight:300;
            font-style:italic;
            color:rgba(239,68,68,.25);
            text-align:center;
            line-height:.95;
            margin-bottom:28px;
        }

        /* ========== PLATFORMER SCENE ========== */
        .scene {
            width:920px;
            height:520px;
            background:linear-gradient(180deg, #0a0a0a 0%, #0d1420 60%, #101828 100%);
            border-radius:16px;
            border:3px solid rgba(255,255,255,.06);
            position:relative;
            overflow:hidden;
            box-shadow:0 30px 60px rgba(0,0,0,.5);
        }

        /* Stars */
        .star {
            position:absolute;
            width:3px;
            height:3px;
            background:rgba(255,255,255,.15);
            border-radius:50%;
        }
        .s1  { top:30px; left:80px; }
        .s2  { top:60px; left:200px; width:2px; height:2px; }
        .s3  { top:20px; left:350px; }
        .s4  { top:50px; left:500px; width:2px; height:2px; }
        .s5  { top:25px; left:650px; }
        .s6  { top:70px; left:780px; width:2px; height:2px; }
        .s7  { top:15px; left:860px; }
        .s8  { top:55px; left:420px; }
        .s9  { top:40px; right:60px; width:2px; height:2px; }
        .s10 { top:80px; left:130px; width:2px; height:2px; }

        /* Ground */
        .ground {
            position:absolute;
            bottom:0;
            left:0;
            right:0;
            height:80px;
        }

        .ground-top {
            height:16px;
            background:rgba(16,185,129,.25);
            border-top:3px solid rgba(16,185,129,.4);
        }

        .ground-body {
            height:64px;
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(139,92,10,.15) 0px,
                    rgba(139,92,10,.15) 2px,
                    transparent 2px,
                    transparent 16px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(139,92,10,.15) 0px,
                    rgba(139,92,10,.15) 2px,
                    transparent 2px,
                    transparent 16px
                );
            background-color:rgba(100,60,20,.2);
        }

        /* Platforms (floating bricks) */
        .platform {
            position:absolute;
            display:flex;
            gap:0;
        }

        .brick {
            width:40px;
            height:40px;
            background:rgba(139,92,10,.2);
            border:2px solid rgba(139,92,10,.35);
            border-radius:3px;
            position:relative;
        }

        .brick::before {
            content:'';
            position:absolute;
            inset:4px;
            border:1px solid rgba(139,92,10,.15);
            border-radius:2px;
        }

        /* Question block */
        .q-block {
            background:rgba(245,158,11,.2);
            border-color:rgba(245,158,11,.4);
        }

        .q-block::after {
            content:'?';
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:'Press Start 2P',monospace;
            font-size:16px;
            color:#fbbf24;
            text-shadow:1px 1px 0 rgba(0,0,0,.4);
        }

        .plat-1 { top:340px; left:60px; }
        .plat-2 { top:240px; left:280px; }
        .plat-3 { top:300px; right:120px; }
        .plat-4 { top:180px; right:280px; }

        /* Pipes */
        .pipe {
            position:absolute;
            bottom:80px;
            width:60px;
        }

        .pipe-top {
            height:24px;
            background:rgba(16,185,129,.3);
            border:3px solid rgba(16,185,129,.45);
            border-radius:4px 4px 0 0;
            margin:0 -6px;
            width:72px;
        }

        .pipe-body {
            background:rgba(16,185,129,.2);
            border-left:3px solid rgba(16,185,129,.35);
            border-right:3px solid rgba(16,185,129,.35);
        }

        .pipe-start { left:140px; }
        .pipe-start .pipe-body { height:60px; }

        .pipe-end   { right:60px; }
        .pipe-end .pipe-body   { height:100px; }

        /* Flag pole at end */
        .flag-pole {
            position:absolute;
            bottom:80px;
            right:86px;
            width:4px;
            height:200px;
            background:rgba(255,255,255,.15);
        }

        .flag-pole::before {
            content:'';
            position:absolute;
            top:0;
            left:4px;
            width:0; height:0;
            border-top:24px solid #10b981;
            border-right:36px solid transparent;
            filter:drop-shadow(1px 1px 0 rgba(0,0,0,.3));
        }

        .flag-pole::after {
            content:'';
            position:absolute;
            top:-6px;
            left:-4px;
            width:12px;
            height:12px;
            background:#fbbf24;
            border-radius:50%;
            box-shadow:0 0 8px rgba(251,191,36,.4);
        }

        /* Power-up blocks popping */
        .powerup {
            position:absolute;
            z-index:5;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:6px;
        }

        .pu-icon {
            width:40px;
            height:40px;
            border-radius:8px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            box-shadow:0 4px 12px rgba(0,0,0,.3);
        }

        .pu-label {
            font-family:'Press Start 2P',monospace;
            font-size:7px;
            padding:3px 8px;
            border-radius:4px;
            white-space:nowrap;
            text-shadow:1px 1px 0 rgba(0,0,0,.5);
        }

        .pu-1 { top:188px; left:340px; }
        .pu-1 .pu-icon { background:rgba(16,185,129,.2); border:2px solid rgba(16,185,129,.35); }
        .pu-1 .pu-label { background:rgba(16,185,129,.15); color:#34d399; }

        .pu-2 { top:285px; left:100px; }
        .pu-2 .pu-icon { background:rgba(245,158,11,.2); border:2px solid rgba(245,158,11,.35); }
        .pu-2 .pu-label { background:rgba(245,158,11,.15); color:#fbbf24; }

        .pu-3 { top:128px; right:306px; }
        .pu-3 .pu-icon { background:rgba(99,102,241,.2); border:2px solid rgba(99,102,241,.35); }
        .pu-3 .pu-label { background:rgba(99,102,241,.15); color:#818cf8; }

        .pu-4 { top:245px; right:158px; }
        .pu-4 .pu-icon { background:rgba(236,72,153,.2); border:2px solid rgba(236,72,153,.35); }
        .pu-4 .pu-label { background:rgba(236,72,153,.15); color:#f472b6; }

        /* Coin trail */
        .coin {
            position:absolute;
            width:18px;
            height:22px;
            border-radius:50%;
            background:rgba(251,191,36,.25);
            border:2px solid rgba(251,191,36,.5);
            box-shadow:0 0 8px rgba(251,191,36,.15);
        }

        .c1 { top:310px; left:230px; }
        .c2 { top:290px; left:255px; }
        .c3 { top:270px; left:280px; }
        .c4 { top:190px; left:450px; }
        .c5 { top:170px; left:475px; }
        .c6 { top:155px; right:190px; }

        /* ========== LEVEL COMPLETE ========== */
        .level-complete {
            width:860px;
            margin-top:24px;
            padding:22px 32px;
            border-radius:8px;
            background:linear-gradient(180deg, rgba(16,185,129,.08) 0%, rgba(16,185,129,.03) 100%);
            border:2px solid rgba(16,185,129,.2);
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .lc-left {
            display:flex;
            align-items:center;
            gap:16px;
        }

        .lc-flag {
            font-size:32px;
        }

        .lc-text {
            font-family:'Press Start 2P',monospace;
            font-size:14px;
            color:#10b981;
            text-shadow:1px 1px 0 rgba(0,0,0,.4);
        }

        .lc-sub {
            font-family:'Press Start 2P',monospace;
            font-size:8px;
            color:rgba(16,185,129,.4);
            margin-top:4px;
        }

        .lc-score {
            text-align:right;
        }

        .lc-score-value {
            font-family:'Press Start 2P',monospace;
            font-size:18px;
            color:#fbbf24;
            text-shadow:1px 1px 0 rgba(0,0,0,.5);
        }

        .lc-score-label {
            font-family:'Press Start 2P',monospace;
            font-size:8px;
            color:rgba(251,191,36,.3);
            margin-top:4px;
        }

        /* World select */
        .world-select {
            display:flex;
            gap:12px;
            margin-top:18px;
        }

        .world-btn {
            padding:12px 20px;
            border-radius:6px;
            font-family:'Press Start 2P',monospace;
            font-size:9px;
            border:2px solid;
            display:flex;
            align-items:center;
            gap:8px;
        }

        .wb-done {
            background:rgba(16,185,129,.08);
            border-color:rgba(16,185,129,.2);
            color:#34d399;
        }

        .wb-current {
            background:rgba(245,158,11,.1);
            border-color:rgba(245,158,11,.3);
            color:#fbbf24;
            box-shadow:0 0 12px rgba(245,158,11,.1);
        }

        .wb-locked {
            background:rgba(255,255,255,.02);
            border-color:rgba(255,255,255,.06);
            color:rgba(255,255,255,.15);
        }

        /* CTA */
        .cta-area {
            display:flex;
            flex-direction:column;
            align-items:center;
            margin-top:28px;
            z-index:15;
        }

        .cta-btn {
            background:linear-gradient(180deg, #ef4444 0%, #b91c1c 100%);
            color:white;
            font-size:22px;
            font-weight:900;
            padding:20px 56px;
            border-radius:8px;
            border:3px solid rgba(239,68,68,.6);
            cursor:pointer;
            margin-bottom:12px;
            box-shadow:0 6px 0 #7f1d1d, 0 8px 20px rgba(239,68,68,.2);
            font-family:'Inter',sans-serif;
            text-shadow:0 2px 0 rgba(0,0,0,.2);
            transform:translateY(-2px);
        }

        .cta-sub {
            font-family:'Press Start 2P',monospace;
            font-size:9px;
            color:rgba(255,255,255,.18);
        }

        .controls {
            position:fixed;
            top:0; left:0; right:0;
            z-index:9999;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(10px);
            padding:12px 24px;
            display:flex;
            align-items:center;
            gap:20px;
            font-size:13px;
            color:white;
        }
        .controls label { display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:500; }
        .controls button {
            background:white; color:#0a0a0a; border:none; padding:8px 24px;
            border-radius:100px; font-family:'Inter',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
        }
    </style>
</head>
<body>

<div class="controls">
    <label><input type="checkbox" id="showSafe"> Show TikTok Safe Zones</label>
    <button id="dl">⬇ Download PNG (1080×1920)</button>
</div>

<input type="checkbox" id="showSafe" style="display:none;">

<div class="frame-wrapper">
    <div class="frame" id="frame">

        <div class="safe-overlay">
            <div class="safe-top"></div>
            <div class="safe-bottom"></div>
            <div class="safe-right"></div>
            <div class="safe-left"></div>
        </div>

        <div class="content">
            <img src="../CW-logo-white.png" alt="CRFTD Web" class="logo-top">

            <!-- Mario HUD -->
            <div class="hud">
                <div class="hud-item">
                    <div class="hud-label">CRFTD</div>
                    <div class="hud-value">095000</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">COINS</div>
                    <div class="hud-value"><span class="coin">×</span> 47</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">WORLD</div>
                    <div class="hud-value">1-4</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">TIME</div>
                    <div class="hud-value"><span class="red">14</span> DAYS</div>
                </div>
            </div>

            <div class="headline">Your website</div>
            <div class="headline-accent">needs a power-up.</div>

            <!-- Platformer Level Scene -->
            <div class="scene">
                <!-- Stars -->
                <div class="star s1"></div><div class="star s2"></div><div class="star s3"></div>
                <div class="star s4"></div><div class="star s5"></div><div class="star s6"></div>
                <div class="star s7"></div><div class="star s8"></div><div class="star s9"></div>
                <div class="star s10"></div>

                <!-- Platforms -->
                <div class="platform plat-1">
                    <div class="brick"></div>
                    <div class="brick q-block"></div>
                    <div class="brick"></div>
                </div>
                <div class="platform plat-2">
                    <div class="brick"></div>
                    <div class="brick q-block"></div>
                    <div class="brick q-block"></div>
                    <div class="brick"></div>
                </div>
                <div class="platform plat-3">
                    <div class="brick q-block"></div>
                    <div class="brick"></div>
                    <div class="brick"></div>
                </div>
                <div class="platform plat-4">
                    <div class="brick"></div>
                    <div class="brick q-block"></div>
                </div>

                <!-- Pipes -->
                <div class="pipe pipe-start">
                    <div class="pipe-top"></div>
                    <div class="pipe-body"></div>
                </div>
                <div class="pipe pipe-end">
                    <div class="pipe-top"></div>
                    <div class="pipe-body"></div>
                </div>

                <!-- Flag pole -->
                <div class="flag-pole"></div>

                <!-- Power-ups popping out of ? blocks -->
                <div class="powerup pu-1">
                    <div class="pu-icon">⚡</div>
                    <div class="pu-label">PageSpeed 95+</div>
                </div>
                <div class="powerup pu-2">
                    <div class="pu-icon">🎯</div>
                    <div class="pu-label">CVR 4.8%</div>
                </div>
                <div class="powerup pu-3">
                    <div class="pu-icon">🔍</div>
                    <div class="pu-label">SEO 92</div>
                </div>
                <div class="powerup pu-4">
                    <div class="pu-icon">🚀</div>
                    <div class="pu-label">1.2s Load</div>
                </div>

                <!-- Coins -->
                <div class="coin c1"></div>
                <div class="coin c2"></div>
                <div class="coin c3"></div>
                <div class="coin c4"></div>
                <div class="coin c5"></div>
                <div class="coin c6"></div>

                <!-- Ground -->
                <div class="ground">
                    <div class="ground-top"></div>
                    <div class="ground-body"></div>
                </div>
            </div>

            <!-- Level Complete -->
            <div class="level-complete">
                <div class="lc-left">
                    <div class="lc-flag">🏁</div>
                    <div>
                        <div class="lc-text">WORLD COMPLETE!</div>
                        <div class="lc-sub">All power-ups collected</div>
                    </div>
                </div>
                <div class="lc-score">
                    <div class="lc-score-value">95,000</div>
                    <div class="lc-score-label">TOTAL SCORE</div>
                </div>
            </div>

            <!-- World Select -->
            <div class="world-select">
                <div class="world-btn wb-done">✓ 1-1 Audit</div>
                <div class="world-btn wb-done">✓ 1-2 Design</div>
                <div class="world-btn wb-done">✓ 1-3 Build</div>
                <div class="world-btn wb-current">★ 1-4 Launch</div>
                <div class="world-btn wb-locked">🔒 2-1 Scale</div>
            </div>

            <div class="cta-area">
                <button class="cta-btn">Press Start ›</button>
                <div class="cta-sub">Free audit · World 1-1</div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
document.querySelector('.controls label input').addEventListener('change', function() {
    document.getElementById('showSafe').checked = this.checked;
});
document.getElementById('dl').addEventListener('click', async () => {
    const btn = document.getElementById('dl');
    btn.textContent = 'Generating...';
    const frame = document.getElementById('frame');
    const wrapper = frame.parentElement;
    const origTransform = wrapper.style.transform;
    wrapper.style.transform = 'none';
    const safeOverlay = frame.querySelector('.safe-overlay');
    safeOverlay.style.display = 'none';
    try {
        const canvas = await html2canvas(frame, {
            width:1080, height:1920, scale:1, useCORS:true,
            backgroundColor:'#0a0a0a', scrollX:0, scrollY:-window.scrollY,
            windowWidth:1080, windowHeight:1920,
        });
        const link = document.createElement('a');
        link.download = 'crftdweb-ad-11-1080x1920.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    } finally {
        wrapper.style.transform = origTransform;
        safeOverlay.style.display = '';
        btn.textContent = '⬇ Download PNG (1080×1920)';
    }
});
</script>
</body>
</html>
